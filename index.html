  <div class="main">
    <header>
      <h1>Quản Lý Tài khoản Người dùng</h1>
      <div class="actions">
        <input id="search" placeholder="Tìm kiếm theo tên hoặc email..." />
        <button id="addBtn" class="btn">+ Thêm Người Dùng Mới</button>
      </div>
    </header>

    <section class="table-wrap">
      <table id="userTable">
        <thead>
          <tr>
            <th></th>
            <th>Tên Người Dùng</th>
            <th>Email</th>
            <th>Vai Trò</th>
            <th>Trạng Thái</th>
            <th>Ngày Tạo</th>
            <th>Hành Động</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <div class="pagination">
        <button id="prev">Prev</button>
        <span id="pageInfo"></span>
        <button id="next">Next</button>
      </div>
    </section>
  </div>

  <!-- modal thêm / chỉnh sửa -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">Thêm Người Dùng</h3>
      <label>Tên</label>
      <input id="f_name" />
      <label>Email</label>
      <input id="f_email" />
      <label>Vai trò</label>
      <select id="f_role">
        <option>Admin</option>
        <option selected>User</option>
      </select>
      <label>Trạng thái</label>
      <select id="f_status">
        <option>Hoạt động</option>
        <option>Bị khóa</option>
      </select>
      <div class="modal-actions">
        <button id="saveBtn" class="btn">Lưu</button>
        <button id="cancelBtn">Hủy</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
